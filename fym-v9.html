<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FYM — la plus belle aventure du monde</title>
<meta name="description" content="FYM — la plus belle aventure du monde. Un rendez-vous quotidien avec soi.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #4A4587;
    --indigo-deep: #3A366B;
    --indigo-soft: #6259A0;
    --coral: #F2A88E;
    --coral-deep: #E8916F;
    --sage: #C3D9A0;
    --sage-deep: #A9C47F;
    --bg: #FBF9FC;
    --card: #FFFFFF;
    --text: #2E2A4A;
    --text-soft: #7A749C;
    --line: #ECE8F2;
    --star: #F2A88E;
  }
  [data-theme="dark"] {
    --bg: #29264F;
    --indigo: #6259A0;
    --card: #34305F;
    --text: #F0EEF8;
    --text-soft: #ABA4CE;
    --line: #423C74;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--coral); border-radius: 10px; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.4s ease;
  }
  #root { max-width: 480px; margin: 0 auto; min-height: 100%; position: relative; }
  .display { font-family: 'Baloo 2', sans-serif; }

  /* Ambient breathing background */
  .ambient {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 30%, rgba(242,168,142,0.10), transparent 60%);
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.15); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .ambient { animation: none; } }

  .screen { position: relative; z-index: 1; padding: 16px 20px 88px; min-height: 100vh; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .screen { animation: none; } }

  /* Header */
  .app-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-name { font-family: 'Baloo 2'; font-weight: 700; font-size: 20px; color: var(--indigo); letter-spacing: 0.5px; }
  .brand-sig { font-size: 10px; color: var(--text-soft); margin-top: -3px; }
  .theme-btn { background: var(--card); border: 1px solid var(--line); width: 38px; height: 38px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--text); }

  /* Progress circle (signature) */
  .circle-wrap { display: flex; justify-content: center; margin: 0 0 4px; }
  .circle-svg { width: 58px; height: 58px; }
  .circle-track { fill: none; stroke: var(--line); stroke-width: 6; }
  .circle-prog { fill: none; stroke: var(--coral); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); }
  .circle-dot { fill: var(--sage-deep); }

  h1.title { font-family: 'Baloo 2'; font-size: 24px; font-weight: 700; color: var(--indigo); margin-bottom: 4px; line-height: 1.15; }
  .subtitle { font-size: 13px; color: var(--text-soft); margin-bottom: 14px; }

  /* Cards */
  .card {
    background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 16px;
    border: 1px solid var(--line);
    box-shadow: 0 6px 20px rgba(74,69,135,0.06);
  }
  .card-glossy {
    background: linear-gradient(145deg, var(--card) 0%, var(--card) 60%, rgba(242,168,142,0.10) 100%);
    position: relative; overflow: hidden;
  }
  .card-glossy::before {
    content: ""; position: absolute; top: -50%; left: -50%; width: 60%; height: 200%;
    background: linear-gradient(115deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: rotate(8deg);
  }

  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--coral-deep); margin-bottom: 10px; }
  .rdv-step { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-top: 1px solid var(--line); }
  .rdv-step:first-of-type { border-top: none; }
  .rdv-num { width: 30px; height: 30px; border-radius: 50%; background: var(--indigo); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; font-family: 'Baloo 2'; }
  .rdv-num.done { background: var(--sage-deep); }
  .rdv-label { font-size: 15px; font-weight: 600; }
  .rdv-sub { font-size: 12.5px; color: var(--text-soft); }
  .rdv-check { margin-left: auto; color: var(--sage-deep); font-size: 18px; }

  .fragment-text { font-size: 18px; line-height: 1.75; color: var(--text); }
  .fragment-text .lex { border-bottom: 2px dotted var(--coral); cursor: pointer; }

  .btn { display: block; width: 100%; text-align: center; border: none; cursor: pointer;
    font-family: 'Inter'; font-weight: 600; font-size: 15px; padding: 15px; border-radius: 100px; transition: transform 0.15s ease; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--coral); color: var(--indigo-deep); }
  .btn-sage { background: var(--sage); color: var(--indigo-deep); }
  .btn-ghost { background: transparent; color: var(--indigo); border: 1.5px solid var(--line); }
  .btn + .btn { margin-top: 10px; }

  /* Present envelope */
  .present-card { text-align: center; padding: 30px 22px; }
  .envelope {
    width: 100%; max-width: 300px; margin: 0 auto; aspect-ratio: 3/2;
    background: linear-gradient(160deg, var(--indigo-soft), var(--indigo));
    border-radius: 14px; position: relative; cursor: grab; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 14px 40px rgba(74,69,135,0.35);
    touch-action: none;
  }
  .env-flap {
    position: absolute; top: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(160deg, var(--indigo), var(--indigo-deep));
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    opacity: 0.55;
  }
  .env-seal-circle {
    position: relative; z-index: 2; width: 62px; height: 62px; border-radius: 50%;
    background: var(--card); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
  .env-hint { font-size: 12.5px; color: var(--text-soft); line-height: 1.6; }
  .present-open-text { font-size: 17px; line-height: 1.75; text-align: left; animation: fadeUp 0.6s ease; }

  /* Carnet */
  .carnet-input { width: 100%; border: 1px solid var(--line); border-radius: 16px; padding: 14px; font-family: 'Inter'; font-size: 15px; resize: none; background: var(--bg); color: var(--text); }
  .carnet-input:focus { outline: none; border-color: var(--coral); }
  .carnet-entry { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }
  .carnet-date { font-size: 11px; color: var(--text-soft); margin-bottom: 5px; }
  .carnet-body { font-size: 14.5px; }
  .empty { text-align: center; color: var(--text-soft); font-size: 14px; padding: 30px 10px; }

  /* Frise des 5 mouvements */
  .mv-strip { display: flex; gap: 5px; margin-bottom: 10px; }
  .mv-pill { flex: 1; text-align: center; padding: 4px 2px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); }
  .mv-pill-num { font-family: 'Baloo 2'; font-weight: 700; font-size: 11px; width: 18px; height: 18px; line-height: 18px; border-radius: 50%; margin: 0 auto; }
  .mv-pill-label { display: none; }
  .mv-current { border-color: var(--coral); border-width: 2px; }
  .mv-current .mv-pill-num { background: var(--coral); color: var(--indigo-deep); }
  .mv-past .mv-pill-num { background: var(--sage-deep); color: #fff; }
  .mv-future { opacity: 0.4; }
  .mv-future .mv-pill-num { background: var(--line); color: var(--text-soft); }

  /* Bottom nav */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
    background: var(--card); border-top: 1px solid var(--line);
    display: flex; justify-content: space-around; padding: 8px 4px calc(8px + env(safe-area-inset-bottom)); z-index: 20;
  }
  .nav-item { flex: 1; background: none; border: none; cursor: pointer; padding: 6px 2px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-soft); font-size: 10px; font-weight: 600; font-family: 'Inter'; }
  .nav-item.active { color: var(--indigo); }
  .nav-ico { font-size: 19px; }
  .nav-item.active .nav-ico { transform: scale(1.1); }
  .brand-foot {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
    display: flex; justify-content: center; padding: 3px 0; z-index: 15; pointer-events: none;
  }
  .brand-foot-pill { display: inline-flex; align-items: center; gap: 5px; opacity: 0.55; background: var(--bg); padding: 2px 10px; border-radius: 100px; }

  /* Path */
  .path-node { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 11px 14px; margin-bottom: 8px; transition: transform 0.15s; }
  .closing-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; animation: fadeUp 0.6s ease; }
  .onb-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 74vh; text-align: center; animation: fadeUp 0.6s ease; }
  .q-bar { width: 100%; height: 3px; background: var(--line); border-radius: 100px; overflow: hidden; }
  .q-bar-fill { height: 100%; background: var(--coral); border-radius: 100px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .q-choice { text-align: left; padding: 16px 18px; margin-bottom: 10px; font-size: 15px; line-height: 1.5; font-weight: 500; }
  .q-choice:active { border-color: var(--coral); background: rgba(242,168,142,0.12); }
  .cmp-row { display: flex; gap: 10px; }
  .cmp-col { flex: 1; min-width: 0; }
  .cmp-lab { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-soft); font-weight: 700; margin-bottom: 5px; }
  .closing-circle { margin-bottom: 18px; animation: pulse 2.2s ease-in-out infinite; }
  .closing-title { font-family: 'Baloo 2'; font-size: 24px; font-weight: 700; color: var(--indigo); }
  .closing-sub { font-size: 15px; color: var(--text-soft); margin: 4px 0 26px; }
  .path-node.tappable:active { transform: scale(0.98); }
  .path-node.locked { opacity: 0.5; }
  .node-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; font-family: 'Baloo 2'; }
  .node-circle.done { background: var(--coral); color: var(--indigo-deep); }
  .node-circle.current { background: var(--sage); color: var(--indigo-deep); box-shadow: 0 0 0 4px rgba(195,217,160,0.3); }
  .node-circle.locked { background: var(--line); color: var(--text-soft); }
  .node-title { font-size: 14.5px; font-weight: 600; }
  .node-sub { font-size: 12px; color: var(--text-soft); }

  /* Toast */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--indigo-deep); color: #fff; padding: 12px 20px; border-radius: 100px; font-size: 13px; z-index: 40; animation: fadeUp 0.3s ease; max-width: 90%; text-align: center; }

  /* Modal (lexicon) */
  .modal-bg { position: fixed; inset: 0; background: rgba(46,42,74,0.5); z-index: 50; display: flex; align-items: flex-end; justify-content: center; animation: fadeUp 0.3s ease; }
  .modal { background: var(--card); width: 100%; max-width: 480px; border-radius: 28px 28px 0 0; padding: 26px 22px calc(26px + env(safe-area-inset-bottom)); }
  .word-parts { display: flex; gap: 6px; justify-content: center; margin: 8px 0 18px; flex-wrap: wrap; }
  .word-part { font-family: 'Baloo 2'; font-size: 26px; color: var(--indigo); animation: partSep 0.6s ease; }
  @keyframes partSep { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { transform: scale(1); box-shadow: 0 4px 14px rgba(242,168,142,0.5); } 50% { transform: scale(1.08); box-shadow: 0 6px 20px rgba(242,168,142,0.7); } }
  @media (prefers-reduced-motion: reduce) { .word-part { animation: none; } }
  @keyframes twinkle { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes threadWave { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  @media (prefers-reduced-motion: reduce) { @keyframes twinkle { } @keyframes threadWave { } }
  .lex-root { text-align: center; font-size: 13px; color: var(--coral-deep); font-weight: 600; margin-bottom: 14px; }
  .lex-block { font-size: 14.5px; margin-bottom: 12px; }
  .lex-block b { color: var(--indigo); }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ============ CONTENU (extrait de départ, mouvement 1 — sera étendu) ============ */
const MOVEMENTS = [
  { id: 1, title: "Le mammifère", sub: "La peur du troupeau" },
  { id: 2, title: "La traversée", sub: "Le désert à traverser" },
  { id: 3, title: "Le retournement", sub: "Ce qui revient toujours" },
  { id: 4, title: "La parole nue", sub: "Le courage discret" },
  { id: 5, title: "La dissolution", sub: "Quand l'effort échoue" },
];

// Fragments du mouvement 1 (matière réelle, reformulée du manuscrit)
const FRAGMENTS = {
  1: [
    { t: "Nous sommes des mammifères sociaux. La solitude nous terrifie tellement que beaucoup préfèrent renoncer à une part d'eux-mêmes plutôt que d'affronter le silence d'être seul face à soi. Chacun devient une personne pour tenir dans le groupe.", lex: "personne" },
    { t: "Il me faut un autre. Sans l'autre, il n'y a pas de moi. Alors je fuis les autres parce que je ne peux pas me fuir moi-même.", lex: "autre" },
    { t: "Ici mon enfant, là mon conjoint, là-bas mon ami, plus loin mon ennemi. Une grande partie de ce que j'appelle « les autres » n'existe que par rapport à ce moi que je crois central.", lex: "moi" },
    { t: "Il existe un amour qui ne demande rien, qui ne mesure pas, qui ne compare pas. Mais il n'est accessible que lorsque l'ego cesse de tenir les comptes.", lex: "amour" },
    { t: "Essayez de deviner votre prochaine pensée, pas celle qui est là, la suivante. Vous ne pouvez pas. Alors qui, exactement, est en train de penser ?", lex: "penser" },
    { t: "Vous croyez avoir choisi vos opinions. Regardez plutôt à quel moment vous les avez prises, et de qui. Presque toutes sont arrivées par contagion, comme un rhume, et vous les défendez comme si vous les aviez enfantées." },
    { t: "Le troupeau ne vous demande pas d'être bon. Il vous demande d'être prévisible. C'est beaucoup moins cher, et cela suffit à ce qu'on vous laisse tranquille." },
    { t: "Ce qui vous fait peur dans la mort, ce n'est pas de ne plus être. C'est de ne plus être quelqu'un. Personne ne pleure la nuit sans rêve." },
    { t: "Vous dites mon corps. Vous dites ma main, ma jambe, ma fatigue. Le possessif est là, chaque fois, tranquille, et personne ne demande jamais à qui.", lex: "individu" },
    { t: "Vous avez accumulé pour vous rassurer. Puis il a fallu protéger ce que vous aviez accumulé. Puis il a fallu travailler pour protéger. Regardez qui tient qui." },
    { t: "Seul dans une pièce, vous êtes encore en représentation. Il y a toujours quelqu'un qui regarde, et ce quelqu'un, vous l'avez installé vous-même, il y a longtemps, et vous ne l'avez jamais congédié." },
    { t: "Votre nom, vous ne l'avez pas choisi. Votre langue, vous ne l'avez pas choisie. Votre époque, votre visage, vos peurs premières. Et c'est de cet assemblage reçu que vous dites : moi." },
    { t: "On vous a appris à tenir votre rang, et vous appelez cela votre caractère. Retirez le rang. Regardez ce qui reste. C'est une expérience que personne ne fait volontiers." },
    { t: "La comparaison est le sport national du moi. Il ne peut pas se sentir sans se mesurer. Un moi seul, sans rien à côté de quoi se poser, s'éteint faute d'adversaire." },
    { t: "Vous n'avez pas peur de la solitude. Vous avez peur de ce qui parlerait s'il n'y avait plus personne pour couvrir la voix.", lex: "solitude" },
  ],
  2: [
    { t: "Ce n'est pas juste. C'est la première phrase, toujours. Comme s'il existait quelque part un contrat, signé, que quelqu'un aurait rompu. Personne n'a jamais vu ce contrat, mais tout le monde s'en réclame." },
    { t: "Vous cherchez à comprendre pour que cela fasse moins mal. Comprendre range, classe, apaise un moment. Mais la douleur ne demandait pas à être comprise, elle demandait à être traversée, et ce n'est pas le même geste.", lex: "comprendre" },
    { t: "Le doute vous semble une panne. Il est peut-être le seul moment où la machine s'arrête assez longtemps pour qu'on voie qu'il y avait une machine.", lex: "douter" },
    { t: "Tenir bon. Serrer les dents. Ne rien lâcher. Et si la fatigue que vous traînez n'était pas celle de l'épreuve, mais celle de la crispation contre l'épreuve ?" },
    { t: "Vous avez perdu, et vous dites que vous avez perdu une part de vous. Regardez la phrase. Elle suppose qu'on possédait. Et si l'on n'avait jamais rien tenu ?" },
    { t: "Demain, vous serez prêt. Demain, vous aurez le temps. Demain vous a été promis chaque jour de votre vie, et il n'est jamais venu, et vous continuez à compter dessus." },
    { t: "La nuit ne s'explique pas, elle se passe. Ceux qui vous proposent une lampe n'ont, la plupart du temps, jamais traversé quoi que ce soit." },
    { t: "Le désir vous jette en avant, toujours en avant. Il ne veut pas l'objet. Il veut vouloir. Donnez-lui ce qu'il réclame et il change aussitôt d'adresse.", lex: "désir" },
    { t: "Le manque vous paraît un trou. Il est plutôt une forme, très précise, qui dessine en creux quelque chose que vous n'avez jamais osé nommer." },
    { t: "Vous attendez. Depuis des années, une part de vous attend. Elle ne dit pas quoi. Elle dit seulement : pas encore, pas maintenant, pas cette vie-ci." },
    { t: "On vous console, et vous en voulez à celui qui console. C'est bon signe. Une part de vous refuse qu'on referme trop vite ce qui vient tout juste de s'ouvrir." },
    { t: "Votre colère a une adresse, toujours, et elle se trompe presque toujours d'étage." },
    { t: "Souffrir, c'est porter en dessous. Le mot le dit avant vous. Il n'y a pas de combat frontal, il y a un poids qu'on soutient, en silence, et souvent très longtemps.", lex: "souffrir" },
    { t: "Vous voulez que cela ait un sens. Vous en avez besoin comme d'air. Mais si le sens venait après, et jamais avant ? S'il fallait d'abord traverser, et ne rien vendre en échange ?" },
    { t: "Vous êtes fatigué de chercher. C'est peut-être la première bonne nouvelle depuis longtemps." },
  ],
  3: [
    { t: "Je pense, donc je suis. La phrase est célèbre. Regardez-la. Elle conclut à l'existence de quelqu'un à partir d'une activité qui n'a jamais présenté ce quelqu'un. On a signé le reçu sans voir la marchandise." },
    { t: "Derrière vos yeux, il y aurait un petit être installé, qui regarde par les trous. Cherchez-le. Retournez-vous. Regardez vers l'endroit d'où vous regardez. Il n'y a pas de visage, de ce côté-là." },
    { t: "Je m'observe, dites-vous. Alors il y en a deux. Celui qui observe et celui qui est observé. Faites l'inventaire. Vous ne trouverez jamais que des observés.", lex: "conscience" },
    { t: "Vos pensées sont à vous. Elles arrivent pourtant sans prévenir, s'installent, repartent, reviennent la nuit. Un invité qui entre sans frapper et qui parle plus fort que l'hôte n'est pas un invité." },
    { t: "Il faut travailler sur soi. La formule est partout. Elle suppose un ouvrier, un chantier, et un plan. Demandez qui a fait le plan. Le silence, à cet endroit, est éloquent." },
    { t: "Vous croyez qu'en comprenant, vous serez libre. Mais chaque chose comprise est une chose rangée, et chaque rangement est un mur de plus dans une maison que personne n'habite." },
    { t: "L'observateur est fatigué. Il surveille depuis des années. Il note, il corrige, il commente. Personne ne lui a jamais demandé s'il voulait ce poste." },
    { t: "L'attention n'est pas un effort. Tendre vers, oui, mais vers quoi ? Quand elle cesse de tendre, elle ne disparaît pas. Elle s'ouvre. Et c'est là que les choses arrivent enfin telles qu'elles sont.", lex: "attention" },
    { t: "Il y a ce qui apparaît, et il y a ce en quoi cela apparaît. Vous passez votre vie occupé du premier terme. Le second n'a jamais bougé, jamais protesté, jamais réclamé son dû." },
    { t: "Vous avez décidé, ce matin. Trancher, couper : c'est ce que dit le mot. Mais regardez bien le moment de la coupe. Vous ne l'avez pas vu. Vous avez vu la décision une fois prise, et vous avez signé après coup.", lex: "décider" },
    { t: "Toute votre vie, le regard est allé vers l'avant, vers les choses, vers les autres, vers demain. Il n'a jamais fait demi-tour. Une seule fois suffirait." },
    { t: "L'ego n'est pas un ennemi. C'est un mot latin qui veut dire je. Il n'y a rien à combattre : il y a une grammaire à cesser de croire.", lex: "ego" },
    { t: "Votre identité, c'est le même. Idem. Ce qui ne change pas. Or rien en vous n'est resté le même, pas une cellule, pas une opinion, pas un désir. Vous appelez identité ce qui n'a jamais tenu en place.", lex: "identité" },
    { t: "L'habitude vous tient debout comme la corde tient le pendu." },
    { t: "Je. Le mot le plus employé de votre vie. Le seul dont vous n'ayez jamais vérifié le référent." },
  ],
  4: [
    { t: "Vous dites ce que vous voulez dire, croyez-vous. Comptez les fois où, la phrase finie, quelque chose est resté dehors, à la porte, sans être entré dans aucun mot." },
    { t: "Nommer donne le sentiment de tenir. On étiquette la peur, la colère, l'angoisse, et l'on croit les avoir rangées. Le nom n'a jamais rien tenu. Il a seulement rendu la chose supportable, ce qui n'est pas la même chose.", lex: "nom" },
    { t: "Le silence vous paraît vide parce que vous n'y êtes jamais resté assez longtemps. Ce n'est pas une absence de bruit. C'est ce qui reste quand on cesse de couvrir.", lex: "silence" },
    { t: "Votre parole vous représente, dites-vous. Elle représente surtout ce que vous avez décidé qu'on saurait. Le reste tient dans les silences, et c'est là qu'on vous lit." },
    { t: "Prier, pour vous, c'est demander. Or celui qui demande installe deux personnes : celui qui manque et celui qui donne. Toute la question tient dans ce nombre." },
    { t: "On vous appelle, vous vous retournez. Toute une vie de réflexe. Mais ce nom vous a été donné avant que vous ayez votre mot à dire, et depuis, il répond à votre place." },
    { t: "La vérité, en grec, c'est ce qui n'est pas oublié. Pas une chose à construire : une chose à cesser de recouvrir. Vous ne cherchez pas la vérité. Vous déblayez.", lex: "vérité" },
    { t: "Se taire n'est pas se retenir de parler. Se retenir, c'est encore parler, mais en dedans, et beaucoup plus fort." },
    { t: "Le mensonge le plus tenace n'est pas celui que vous dites aux autres. C'est la phrase que vous vous répétez depuis si longtemps que vous ne l'entendez plus comme une phrase." },
    { t: "Expliquer, c'est déplier. Vous dépliez, vous dépliez, et à la fin la table est couverte de papier et la chose n'est plus là." },
    { t: "Une définition est une clôture. Le mot le dit : elle pose des bornes. On croit avoir saisi quelque chose alors qu'on a seulement décidé où l'on cesserait de regarder." },
    { t: "Il y a des cris qui ne sortent pas, et qui font tout le bruit." },
    { t: "Écouter vraiment est si rare que ceux qui en font l'expérience une fois s'en souviennent vingt ans après. Cela ne demande aucune compétence. Cela demande seulement de n'être pas occupé à préparer sa réponse." },
    { t: "Vous vous êtes confié, et vous vous êtes senti plus léger, puis plus nu, puis un peu trahi. Personne ne vous avait trahi. Vous aviez seulement fait sortir la chose, et une chose sortie ne rentre plus." },
    { t: "Ce qui compte le plus dans votre vie n'a jamais été dit. Ni par vous, ni à vous. Et cela n'a pas empêché la chose d'être là, tout ce temps." },
  ],
  5: [
    { t: "Un jour, vous serez éveillé. C'est la dernière carotte, la plus fine, celle qui ressemble le moins à une carotte. Elle promet une fin au temps, et pour cela elle a besoin de temps." },
    { t: "Il y a un moi, et il va mourir. Exister, c'est se tenir hors de. Regardez : le mot lui-même vous place dehors. Personne n'a jamais dit ce qu'il y avait dedans.", lex: "exister" },
    { t: "Si le moi n'existe pas, alors plus rien ne compte, dites-vous. Curieuse comptabilité. Vous venez d'avouer que tout ce qui comptait, comptait pour lui." },
    { t: "La mort vous paraît une fin parce que vous la regardez depuis le personnage. Demandez au personnage ce qu'il faisait avant sa première réplique. Il ne saura pas répondre, et ce silence est la réponse.", lex: "mourir" },
    { t: "Quelqu'un doit bien tenir le volant. C'est l'évidence la plus solide et la moins vérifiée de votre vie. Vous n'avez jamais vu ce quelqu'un. Vous avez vu la route défiler, et vous avez conclu." },
    { t: "À la fin, vous saurez qui vous êtes. Sauf que savoir, c'est encore deux : celui qui sait et la chose sue. Le seul endroit où vous ne pourrez jamais vous tenir, c'est en face de vous." },
    { t: "Personne. Le mot est terrible et il est doux. Terrible pour qui se croit quelqu'un. Doux pour qui a porté ce quelqu'un toute sa vie sans jamais poser la valise." },
    { t: "L'illusion n'est pas ce qui n'existe pas. C'est ce qui entre en jeu, ce qui joue. Le monde ne disparaît pas quand on cesse d'y croire. Il cesse seulement de vous être dû.", lex: "illusion" },
    { t: "Vous avez peur du rien. Mais vous n'avez jamais rencontré le rien. Vous avez rencontré l'idée du rien, qui est une chose, et une chose très bruyante." },
    { t: "Séparer, c'est préparer à part. Le mot avoue le travail. La séparation n'est pas un fait : c'est un ouvrage, quotidien, épuisant, et vous en êtes l'artisan.", lex: "séparer" },
    { t: "Absolu veut dire délié. Non pas ce qui écrase tout, mais ce qui n'est attaché à rien. Vous cherchiez une puissance. C'était une absence de laisse.", lex: "absolu" },
    { t: "Le réel, c'est la chose. Rien de plus. Ce qui vous encombre n'est pas le réel : ce sont vos commentaires sur le réel, et ils ne dorment jamais.", lex: "réel" },
    { t: "Il n'y a rien à atteindre. La phrase est insupportable tant qu'il reste quelqu'un pour l'entendre comme une privation." },
    { t: "Il n'y a personne à éveiller. Aucun maître n'a jamais éveillé quiconque. Ce qu'on appelle transmission est un malentendu qui a parfois, par hasard, de bons effets." },
    { t: "Vous avez cherché partout, très loin, très longtemps, avec un sérieux admirable. Et il suffisait de tourner le regard." },
  ],
};

  "Il y a un mot que vous prononcez des dizaines de fois par jour sans jamais le regarder : « je ». Il semble désigner quelque chose de solide, de continu, un noyau qui serait vous. Mais cherchez-le, une seconde. Où est-il ? Dans votre poitrine, dans votre tête, quelque part entre les deux ? Chaque fois que vous croyez le saisir, il a déjà glissé ailleurs, devenu l'observateur de ce que vous vouliez observer. Les sages de toutes les traditions ont buté sur la même chose, et certains en ont ri aux éclats. Non pas parce qu'il n'y a personne, mais parce que ce que vous êtes est trop vaste pour tenir dans un mot de deux lettres. Aujourd'hui, portez ce petit vertige avec vous.",
  "Quelqu'un, un jour, a regardé le ciel et a eu peur du silence entre les étoiles. Quelqu'un d'autre, au même instant à l'autre bout du monde, a regardé le même silence et s'y est senti chez lui. Le ciel n'avait pas changé, seul le regard différait. Presque tout ce que vous vivez fonctionne ainsi : ce n'est pas ce qui arrive qui vous façonne, mais l'accueil que vous lui réservez, cet accueil décidé si vite que vous le prenez pour la réalité elle-même. Et si, aujourd'hui, une chose que vous jugez d'ordinaire pénible arrivait, et que vous suspendiez une seconde le jugement, juste avant qu'il tombe ? Dans cet intervalle minuscule, quelque chose est possible. Vous seul pouvez savoir quoi.",
  "Vous êtes un mammifère. C'est un fait qu'on préfère oublier, parce qu'il explique trop de choses. Votre peur du rejet n'est pas une faiblesse de caractère : c'est une mémoire ancienne, celle du petit être qui, séparé du groupe, ne passait pas la nuit. Rien d'humiliant là-dedans. Mais regardez ce que cette peur très ancienne pilote aujourd'hui : vos silences dans les réunions, vos rires un peu trop rapides, ce que vous n'avez pas dit hier soir. Un réflexe vieux de millions d'années gouverne encore vos dîners du samedi. La bonne nouvelle, c'est qu'un réflexe qu'on voit fonctionner cesse aussitôt d'être une identité.",
  "Vous connaissez cette sensation : vous entrez dans une pièce, et quelque chose en vous s'ajuste. La voix change d'un demi-ton. Le dos se redresse ou se voûte. Le vocabulaire se trie tout seul. Personne ne vous a rien demandé. On appelle cela être poli, être adapté, savoir vivre. C'est peut-être vrai. Mais notez tout de même la vitesse de l'ajustement : plus rapide que la pensée. Ce n'est donc pas vous qui l'avez fait. Aujourd'hui, ne changez rien. Regardez seulement la manœuvre. Elle est fascinante quand on cesse de la prendre pour soi.",
  "On vous a dit très tôt qui vous étiez. Un enfant sage, un enfant difficile, le sensible, le solide, celui qui réussit, celui qui déçoit. Vous aviez trois ans, cinq ans. Vous n'avez pas discuté : on n'a pas les moyens de discuter à cet âge. Vous avez pris le costume, et vous l'avez porté si longtemps qu'il a fini par avoir la forme de votre corps. La question n'est pas de savoir si le costume était juste. La question est de savoir s'il vous est arrivé, une seule fois, de le retirer pour voir.",
  "Regardez votre journée d'hier. Combien de gestes avez-vous faits pour vous ? Et combien pour qu'on vous voie les faire ? La question est désagréable. Elle l'est pour tout le monde, y compris pour ceux qui prétendent le contraire, surtout pour ceux-là. Il ne s'agit pas de se juger : il y a assez de tribunaux dans une vie. Il s'agit seulement de compter. Le simple fait de compter, sans rien corriger, déplace déjà quelque chose. Essayez aujourd'hui, sans rien vous interdire.",
  "Vous croyez avoir des convictions. Faites une expérience : prenez celle qui vous tient le plus à cœur, et cherchez le jour où elle est entrée. Vous ne le trouverez presque jamais. Elle est arrivée par un père, un livre, une humiliation, une rencontre. Vous ne l'avez pas fabriquée : vous l'avez attrapée. Et vous la défendez avec l'énergie de qui protège son enfant. Ce n'est pas une raison pour l'abandonner. C'est une raison pour cesser de croire que la défendre, c'est vous défendre vous.",
  "Il y a en vous quelqu'un qui compare. Il ne s'arrête jamais. Dans la rue, il classe. Sur un écran, il mesure. Devant un ami qui réussit, il fait un calcul rapide et vous rend un résultat, souvent désagréable. Vous n'avez jamais embauché ce comptable, et vous n'arrivez pas à le licencier. Aujourd'hui, ne le combattez pas : il adore ça, cela lui donne du travail. Écoutez-le simplement une fois, jusqu'au bout, comme on écoute quelqu'un qui radote. Vous verrez : il n'a qu'une seule phrase.",
  "La solitude vous fait peur. Pas la solitude tranquille d'un dimanche, l'autre : celle où plus personne n'a besoin de vous. Vous l'appelez le vide. Mais regardez de plus près ce que vous appelez le vide. Ce n'est pas un manque de gens. C'est un excès de silence, et dans ce silence, une voix qui se met à parler, la vôtre, celle que le bruit couvrait. Vous ne fuyez pas les autres. Vous fuyez ce qui parle quand ils s'en vont.",
  "Vous avez un ennemi. Peut-être plusieurs. Vous les portez avec une constance touchante : ils occupent vos trajets, vos insomnies, vos conversations. Remarquez qu'ils ne vous coûtent rien à entretenir, sauf votre vie. Et remarquez surtout ceci : sans eux, une part de vous ne saurait plus qui elle est. L'ennemi n'est pas seulement une gêne. C'est un pilier. C'est peut-être pour cela qu'on n'en manque jamais.",
  "Un jour, vous ne serez plus dans les conversations. Ni en bien, ni en mal. Les gens qui vous connaissaient auront disparu à leur tour, et ce sera fini, sans drame. Cette pensée est insupportable à celui qui veut compter. Elle est reposante pour celui qui a passé sa vie à essayer. Regardez laquelle des deux réactions monte en vous ce matin. C'est un renseignement précieux, et il ne coûte rien.",
  "Vous avez accumulé. Des objets, des titres, des preuves. Chacun devait vous rendre plus solide. Faites le compte honnête : lequel vous a rendu moins inquiet ? Les biens ne rassurent pas, ils déplacent l'inquiétude vers ce qu'il faut désormais garder. Ce n'est pas un plaidoyer pour la pauvreté, ce serait une autre pose. C'est une simple observation comptable, et vous êtes le seul à pouvoir la faire.",
  "On parle de vous en ce moment. Peut-être en bien, peut-être pas. Vous n'y pouvez rien, et surtout, vous n'y êtes pas. Ce qui circule, ce n'est pas vous : c'est une rumeur qui porte votre nom. Toute votre vie, vous avez essayé de corriger cette rumeur, de la redresser, de la rendre plus juste. Cela ressemble à une vie entière passée à repeindre une pièce dans laquelle on n'habite pas.",
  "Votre visage, vous ne le voyez jamais. Vous voyez son reflet, sa photo, l'idée que vous vous en faites. Il est le seul endroit du monde que votre regard n'atteindra pas directement. Étrange, pour ce que vous appelez votre identité : c'est précisément la chose que vous n'avez jamais vue. Aujourd'hui, quand vous passerez devant un miroir, notez juste ce petit décalage. Ce n'est pas rien, ce que vous cherchez là.",
  "Il vous est arrivé, un jour, d'être parfaitement là. Cela n'a pas duré. Peut-être dans l'enfance, peut-être devant la mer, peut-être dans une salle d'attente d'hôpital, ce qui serait ironique. Personne ne l'a remarqué, vous non plus sur le moment. Il n'y avait rien à faire, rien à devenir. Ce moment n'est pas perdu : il n'est allé nulle part. C'est vous qui êtes reparti.",
  "Vous êtes fatigué. Pas du travail, pas du manque de sommeil. D'une chose plus sourde : de tenir. Tenir son rang, tenir sa forme, tenir bon, tenir tête. Toute la journée, un muscle est contracté quelque part, et vous ne savez plus lequel. Aujourd'hui, ne le relâchez pas, ce serait encore une tâche. Cherchez seulement où il est. C'est déjà beaucoup, et cela n'exige rien.",
  "On vous demande souvent comment vous allez. Vous répondez. La réponse sort seule, prête, calibrée. Ce n'est pas un mensonge, c'est un usage. Mais notez que la vraie réponse, celle que vous ne donnez pas, vous ne vous la donnez pas non plus. Elle attend. Elle n'est pas pressée. Elle attend depuis des années, très patiemment, que quelqu'un pose la question sans attendre de réponse polie.",
  "Ce n'est pas juste. Vous l'avez pensé récemment, peut-être ce matin. Regardez la phrase : elle suppose un contrat. Un accord passé quelque part, avec quelqu'un, garantissant qu'en échange de vos efforts, la vie tiendrait certains engagements. Personne n'a jamais vu ce contrat. Personne ne l'a signé pour vous. Et pourtant vous continuez à en réclamer l'exécution. Il ne s'agit pas de renoncer à la justice : elle vaut, entre les hommes, et il faut se battre pour elle. Il s'agit de voir que vous l'exigez aussi de la pluie.",
  "Vous voulez comprendre. Comprendre pourquoi c'est arrivé, comprendre à qui la faute, comprendre ce que cela veut dire. La compréhension range, et le rangement soulage un moment. Puis la douleur revient, intacte, parce qu'elle ne demandait pas à être comprise. Elle demandait à être portée. Ce n'est pas le même geste, et ce n'est pas la même fatigue. Aujourd'hui, si quelque chose fait mal, essayez de ne pas l'expliquer pendant une heure. Une seule.",
  "Le doute vous humilie. Vous le prenez pour une panne, un défaut de fabrication, la preuve que vous n'êtes pas à la hauteur. Regardez-le autrement : c'est le seul moment où la machine s'arrête assez longtemps pour qu'on voie qu'il y avait une machine. Les certitudes tournent si vite qu'elles sont invisibles. Le doute les ralentit. Ce que vous appelez votre faiblesse est peut-être la seule fenêtre de la maison.",
  "Vous serrez les dents. Depuis des mois, peut-être des années. Vous appelez cela du courage, et c'en est peut-être. Mais interrogez la fatigue : est-elle celle de l'épreuve, ou celle de la crispation contre l'épreuve ? Ce n'est pas la même. L'une passe avec l'épreuve. L'autre reste longtemps après, et personne ne comprend pourquoi vous êtes encore si las alors que tout est fini.",
  "Vous avez perdu quelqu'un. Ou quelque chose. Et vous dites : j'ai perdu une part de moi. Regardez la phrase, doucement, sans la brusquer. Elle suppose qu'on possédait. Elle suppose qu'une personne peut être une part de vous, ce qui est la plus tendre et la plus fausse des idées. Ce que vous pleurez n'est pas une possession disparue. C'est un lien, et un lien ne se possède pas : il se traverse.",
  "Demain, vous serez prêt. Demain, vous aurez le temps, la force, le calme. Demain vous a été promis chaque jour de votre vie, depuis très longtemps, et il n'est jamais venu une seule fois. C'est un fournisseur remarquablement peu fiable, et vous continuez à passer commande. Aujourd'hui, ne changez rien à vos plans. Notez seulement l'heure à laquelle vous avez, pour la première fois, remis quelque chose à demain.",
  "La nuit ne s'explique pas. Elle se passe. Ceux qui vous tendent une lampe et une méthode n'ont, la plupart du temps, jamais traversé quoi que ce soit. Ceux qui ont traversé disent peu de choses, et ils restent. C'est à cela qu'on les reconnaît : ils ne proposent rien, ils ne partent pas.",
  "Ce que vous désirez, vous le désirez depuis toujours sous d'autres noms. L'objet change, jamais l'élan. Obtenez ce que vous voulez, et regardez ce qui se passe : quarante-huit heures de paix, puis l'élan se redresse et cherche une nouvelle adresse. Il ne voulait pas l'objet. Il voulait vouloir. Ce n'est pas une malédiction. C'est un renseignement sur la nature de la faim, et il change tout.",
  "Le manque vous paraît un trou, une absence, un rien. Regardez mieux : il a une forme. Très précise. Il dessine en creux quelque chose que vous n'avez peut-être jamais osé nommer. Le manque n'est pas vide : il est plein de la forme de ce qui n'est pas là. Aujourd'hui, ne cherchez pas à le combler. Regardez seulement son contour.",
  "Une part de vous attend. Depuis des années. Elle ne dit pas quoi. Elle dit seulement : pas encore, pas maintenant, pas cette vie-ci. Elle a des raisons, toujours excellentes. Demandez-lui, une fois, ce qu'elle attend exactement. Vous verrez qu'elle n'a pas de réponse, et qu'elle en est la première surprise.",
  "On vous console, et vous en voulez à celui qui console. Vous vous en voulez d'en vouloir. C'est bon signe : une part de vous refuse qu'on referme trop vite ce qui vient à peine de s'ouvrir. La consolation prématurée est une porte qu'on claque poliment. Vous avez raison de tenir la porte. Personne ne vous en félicitera.",
  "Votre colère a une adresse. Elle est très sûre d'elle. Elle sait exactement qui est en tort, depuis quand, et pourquoi. Notez tout de même ceci : elle se trompe presque toujours d'étage. Ce n'est pas une raison pour l'étouffer, l'étouffer la renforce. C'est une raison pour la suivre jusqu'en bas, un jour, quand vous serez seul, et de voir contre quoi elle cognait vraiment.",
  "Souffrir, c'est porter par-dessous. Le mot le dit avant vous : sub, ferre. Il n'y a pas de combat frontal, pas de duel, pas d'ennemi. Il y a un poids, et quelqu'un dessous qui le soutient. C'est plus modeste qu'une bataille et beaucoup plus long. On vous a vendu l'héroïsme. Ce qui se passe est plus discret, et personne ne vous verra.",
  "Vous voulez que cela ait un sens. Vous en avez besoin comme d'air. Mais regardez le marché que vous proposez : je consens à souffrir, à condition que cela serve à quelque chose. C'est une négociation, et l'autre partie ne répond jamais. Le sens vient parfois. Il vient après, jamais avant, et jamais parce qu'on l'a exigé.",
  "Il vous est arrivé de vous en vouloir de tenir debout. De rire trop tôt après un deuil, de trouver le café bon le jour d'un enterrement. Vous avez appelé cela de l'indécence. Ce n'en était pas. C'était la vie qui continuait sans demander la permission, et vous n'y êtes pour rien, ni en bien ni en mal.",
  "Vous êtes fatigué de chercher. C'est peut-être la meilleure nouvelle depuis longtemps, et vous ne le savez pas encore. Tant que la recherche tenait, elle vous donnait une occupation, une direction, une identité de chercheur. Sa fatigue n'est pas un échec : c'est le premier silence de la journée.",
  "Personne ne viendra. C'est dur et c'est net. Personne ne viendra vous chercher, vous expliquer, vous sauver. Et c'est en découvrant cela que beaucoup, curieusement, ont cessé d'avoir peur. Tant qu'on attend quelqu'un, on reste à la fenêtre. Quand on cesse d'attendre, on se retourne enfin vers la pièce, et l'on voit qu'elle était habitée.",
  "Ce que vous traversez en ce moment ne vous apprendra peut-être rien. C'est une possibilité qu'on ne vous laisse jamais envisager. Toute épreuve ne grandit pas. Certaines abîment, simplement. Le dire n'est pas du pessimisme, c'est du respect : cela vous dispense de l'obligation épuisante de trouver un enseignement à ce qui n'en a pas.",
  "Je pense, donc je suis. Vous avez appris cette phrase à l'école, et elle vous a paru solide. Regardez-la ce matin, sans respect. Elle conclut à l'existence de quelqu'un à partir d'une activité qui n'a jamais présenté ce quelqu'un. Il y a de la pensée, c'est certain. Que quelqu'un la produise, personne ne l'a jamais vérifié. Le reçu a été signé sans que la marchandise soit livrée.",
  "Retournez-vous. Pas la tête : le regard. Regardez vers l'endroit d'où vous êtes en train de regarder. Il n'y a rien à voir, de ce côté-là. Pas de visage, pas de tête, pas de petit être installé aux commandes. Un espace, très ouvert, dans lequel la pièce apparaît. Cela dure une seconde, puis le monde se reforme. Cette seconde n'est pas un truc. C'est ce que certains ont passé une vie à retrouver.",
  "Je m'observe, dites-vous. Alors vous êtes deux. Faites l'inventaire, honnêtement : cherchez l'observateur. Chaque fois que vous le cherchez, vous ne trouvez qu'un observé de plus, une sensation, une pensée, une image. L'observateur recule d'un pas à chaque tentative, comme un horizon. C'est peut-être qu'il n'est pas une chose. C'est peut-être qu'il est l'espace où toutes les choses arrivent.",
  "Vos pensées sont à vous. Vraiment ? Elles arrivent sans prévenir, s'installent, repartent, reviennent à trois heures du matin sans avoir été invitées. Un hôte qui entre sans frapper, qui parle plus fort que vous, et qui vous empêche de dormir n'est pas un hôte : c'est un occupant. Aujourd'hui, ne les chassez pas. Notez simplement l'heure de leur arrivée. Vous verrez qu'elles ont des habitudes.",
  "Il faut travailler sur soi. La formule est partout, elle est devenue une évidence, personne ne la questionne. Elle suppose pourtant un ouvrier, un chantier, et un plan. Demandez qui a fait le plan. Demandez surtout qui est l'ouvrier, et de quoi il est fait. À cet endroit précis, le silence est total, et c'est le seul endroit où il fallait regarder.",
  "Vous croyez qu'en comprenant, vous serez libre. C'est le pari de toute une vie. Mais chaque chose comprise est une chose rangée, et chaque rangement ajoute un mur à une maison que personne n'habite. La bibliothèque grandit, le bibliothécaire reste introuvable.",
  "L'observateur en vous est fatigué. Il surveille depuis des décennies, il note, il corrige, il commente, il compare. Il n'a jamais pris de vacances. Personne ne lui a jamais demandé s'il voulait ce poste. Aujourd'hui, vous ne pouvez pas le licencier. Mais vous pouvez, une fois, le regarder travailler. Il n'aime pas cela du tout.",
  "L'attention est une tension. Le mot le dit : ad-tendere, tendre vers. Toute la journée, elle vise, elle veut, elle se dirige. On la croit ouverte alors qu'elle est bandée comme un arc. Il existe pourtant une attention qui ne tend vers rien, et qui pourtant voit tout. Vous l'avez connue enfant, avant qu'on vous apprenne à faire attention.",
  "Il y a ce qui apparaît, et il y a ce en quoi cela apparaît. Vous passez votre vie occupé du premier terme : les événements, les gens, les pensées, les douleurs. Le second n'a jamais bougé, jamais protesté, jamais réclamé son dû. Il est si constant qu'il en est invisible, comme l'écran l'est au spectateur.",
  "Vous avez décidé, ce matin. Décider, c'est trancher : de-caedere, couper. Mais regardez bien le moment de la coupe. Vous ne l'avez pas vu. Vous avez vu la décision une fois prise, déjà là, et vous avez signé après coup en croyant l'avoir voulue. Toute votre vie, vous avez contresigné des décisions dont vous n'avez jamais assisté à la naissance.",
  "Toute votre vie, le regard est allé vers l'avant. Vers les choses, vers les autres, vers demain, vers ce qui manque. Il n'a jamais fait demi-tour. Pas une fois. C'est un mouvement si simple qu'il paraît absurde, et si peu pratiqué qu'il en devient vertigineux. Il ne demande ni méthode, ni maître, ni argent. Il demande une seconde.",
  "L'ego n'est pas votre ennemi. C'est un mot latin qui veut dire : je. Un pronom. Nous en avons fait un démon, une instance, un adversaire à réduire, et des industries entières vivent de ce combat. Il n'y a rien à terrasser. Il y a une grammaire à cesser de croire, ce qui est beaucoup moins spectaculaire et beaucoup plus efficace.",
  "Votre identité, c'est idem : le même. Or rien en vous n'est resté le même. Pas une cellule, pas une opinion, pas un goût, pas une peur d'enfance. Vous appelez identité précisément ce qui n'a jamais cessé de changer, et vous en réclamez la constance. Le mot vous a menti dès le premier jour, et vous ne lui en avez jamais tenu rigueur.",
  "L'habitude vous tient debout. C'est vrai, et c'est pour cela qu'on y tient. Mais regardez ce qui tient quoi : sans elle, vous tomberiez, dites-vous. Alors ce n'est pas vous qui tenez debout. C'est elle. Vous êtes porté depuis longtemps par ce que vous croyez conduire.",
  "Vous avez dit « je » cent fois hier. C'est le mot le plus employé de votre vie, et le seul dont vous n'ayez jamais vérifié le référent. Dans n'importe quel autre domaine, cela s'appellerait une négligence grave. Ici, cela s'appelle vivre.",
  "Il y a en vous quelque chose qui n'a pas d'âge. Vous le savez, sans pouvoir le prouver. Quand vous croisez une photo de vous à sept ans, ce n'est pas le corps que vous reconnaissez, ni les idées, ni les goûts : tout cela a changé. C'est autre chose, sans nom, qui regarde. Ce quelque chose n'a pas grandi. Il n'a pas non plus vieilli.",
  "Quand vous dormez sans rêve, où êtes-vous ? Vous ne disparaissez pas : au réveil, vous savez que vous avez bien dormi. Quelqu'un était donc là, sans pensée, sans image, sans nom. Quelqu'un a constaté l'absence. Cette présence sans contenu, vous la traversez toutes les nuits, et vous n'en parlez jamais.",
  "Aujourd'hui, une fois, entre deux tâches, il y aura un intervalle. Une seconde où rien ne sera demandé, où aucune pensée ne sera encore arrivée. Vous le remplirez aussitôt, par réflexe, avec un écran ou une inquiétude. Ce n'est pas grave. Notez seulement que l'intervalle a existé, et que quelque chose s'est précipité pour le combler.",
  "Vous dites ce que vous voulez dire, croyez-vous. Comptez les fois où, la phrase finie, quelque chose est resté dehors, à la porte, sans être entré dans aucun mot. Ce n'est pas un défaut d'éloquence. Il y a, dans toute vie, une part qui ne passera jamais par la bouche. Elle n'en est pas moins réelle. Elle est peut-être la seule à l'être.",
  "Nommer donne le sentiment de tenir. Vous étiquetez la peur, la colère, l'angoisse, et vous croyez les avoir rangées. Le nom n'a jamais rien tenu. Il a seulement rendu la chose supportable, ce qui est très différent, et parfois très utile. Mais ne confondez pas le tiroir et ce qu'il contient.",
  "Le silence vous paraît vide parce que vous n'y êtes jamais resté assez longtemps. Ce n'est pas l'absence de bruit. Silere veut dire : ne pas remuer. On peut se taire dans un vacarme. On peut faire un bruit d'enfer, seul, dans une pièce vide.",
  "Votre parole vous représente, dites-vous. Elle représente surtout ce que vous avez décidé qu'on saurait. Le reste tient dans les silences, dans les hésitations, dans les sujets que vous contournez avec une élégance dont vous n'avez pas conscience. C'est là qu'on vous lit, et ceux qui vous aiment le savent depuis longtemps.",
  "Prier, pour vous, c'est demander. Or celui qui demande installe aussitôt deux personnes : celui qui manque et celui qui donne. Toute la question tient dans ce nombre. Il existe une prière qui ne demande rien, et elle ressemble tellement au silence qu'on ne la reconnaît pas.",
  "On vous appelle, vous vous retournez. Toute une vie de réflexe. Ce nom vous a été donné avant que vous ayez votre mot à dire, et depuis, il répond à votre place. Aujourd'hui, quand quelqu'un prononcera votre prénom, notez la seconde qui précède le retournement. Elle est très courte. Elle ne contient personne.",
  "La vérité, en grec, c'est le non-oubli. Alêtheia : ce qui n'est plus recouvert. Pas une chose à construire, pas une thèse à démontrer : une chose à cesser de cacher. Vous ne cherchez pas la vérité. Vous déblayez. C'est un travail de manœuvre, pas d'architecte, et c'est pour cela qu'il est si peu prisé.",
  "Se taire n'est pas se retenir de parler. Se retenir, c'est encore parler, mais en dedans, et beaucoup plus fort. Vous connaissez ces silences-là : ils bourdonnent. Il en existe d'autres, où rien ne bourdonne. Ceux-là ne s'obtiennent pas par la volonté, et c'est bien le problème.",
  "Le mensonge le plus tenace n'est pas celui que vous dites aux autres. C'est la phrase que vous vous répétez depuis si longtemps que vous ne l'entendez plus comme une phrase. Vous l'entendez comme une donnée du monde. Elle commence souvent par : je suis quelqu'un qui.",
  "Expliquer, c'est déplier. Vous dépliez, vous dépliez, et à la fin la table est couverte de papier et la chose n'est plus là. Certaines choses ne survivent pas à leur explication. Vous le savez : vous l'avez fait à un souvenir, une fois, et il n'est jamais revenu intact.",
  "Une définition est une clôture. Le mot l'avoue : elle pose des bornes, elle décide où l'on cesse de regarder. On croit avoir saisi quelque chose alors qu'on a seulement planté une barrière. C'est très pratique. Ce n'est pas connaître.",
  "Il y a des cris qui ne sortent pas, et qui font tout le bruit. Vous en portez peut-être un. Il n'a pas besoin d'être poussé, il a besoin d'être entendu, ce qui n'est pas la même chose, et ce qui peut se faire en silence.",
  "Écouter vraiment est si rare que ceux qui en font l'expérience une seule fois s'en souviennent vingt ans après. Cela ne demande aucune compétence, aucun diplôme, aucune sagesse. Cela demande une seule chose, et c'est pour cela que c'est rare : n'être pas occupé à préparer sa réponse.",
  "Vous vous êtes confié, un jour, et vous vous êtes senti plus léger, puis plus nu, puis un peu trahi. Personne ne vous avait trahi. Vous aviez seulement fait sortir la chose, et une chose sortie ne rentre plus. Ce n'était pas une erreur. C'était un accouchement, et cela laisse des traces.",

/* ============ VERSION & CACHE CONTROL ============ */
const APP_VERSION = "9"; // Incrémenter à chaque livraison (v1, v2, v3...)
if (typeof window !== "undefined") {
  const storedVersion = localStorage.getItem("fym_version");
  if (storedVersion !== APP_VERSION) {
    // Version mismatch : l'utilisateur a téléchargé un nouveau fichier.
    // Clear complet et rechargement.
    localStorage.clear();
    sessionStorage.clear();
    localStorage.setItem("fym_version", APP_VERSION);
    window.location.reload();
  }
}

/* ============ STATE ============ */
const todayStr = () => new Date().toISOString().slice(0,10);
const DEFAULT_STATE = {
  onboarded: false,
  progression: { mouvement: 1, section: 1, done: [] },
  carnet: [],
  presents: {},
  prefs: { theme: "light" },
  circleNotches: 0,
  installDate: null,
  relectures: { mouvements: [], j30: false, j90: false },
  constellation: { etoiles: [], fils: [] },
  // Calibrage interne (B12) : jamais affiché, jamais présenté comme un profil.
  // Sert uniquement à trier l'ordre d'apparition des éclaireurs.
  questionnaire: { passations: [], calibrage: null },
};
function daysSince(dateStr) {
  if (!dateStr) return 0;
  const ms = new Date(todayStr()) - new Date(dateStr);
  return Math.floor(ms / 86400000);
}
function loadState() {
  try {
    const raw = localStorage.getItem("fym_state");
    const s = raw ? JSON.parse(raw) : null;
    const st = s ? {...DEFAULT_STATE, ...s} : {...DEFAULT_STATE};
    st.relectures = {...DEFAULT_STATE.relectures, ...(s && s.relectures ? s.relectures : {})};
    // Clonage : sans cela, un état sans constellation/questionnaire hériterait de la
    // RÉFÉRENCE de DEFAULT_STATE, et le moindre push la polluerait pour toute la session.
    st.constellation = s && s.constellation
      ? { etoiles: [...(s.constellation.etoiles || [])], fils: [...(s.constellation.fils || [])] }
      : { etoiles: [], fils: [] };
    st.questionnaire = s && s.questionnaire
      ? { passations: [...(s.questionnaire.passations || [])], calibrage: s.questionnaire.calibrage || null }
      : { passations: [], calibrage: null };
    // premier lancement (ou état antérieur sans date) : on pose le repère J0 pour J30/J90
    if (!st.installDate) { st.installDate = todayStr(); saveState(st); }
    // nettoyage rétroactif des doublons de fils (corrige les données des versions antérieures)
    if (st.constellation && st.constellation.fils) {
      const seen = new Set(); const clean = [];
      st.constellation.fils.forEach(f => {
        const k = [f.de,f.vers].sort().join("|");
        if (!seen.has(k)) { seen.add(k); clean.push(f); }
      });
      st.constellation.fils = clean;
      st.constellation.etoiles = [...new Set(st.constellation.etoiles || [])];
    }
    return st;
  }
  catch { return {...DEFAULT_STATE}; }
}
function saveState(s) { try { localStorage.setItem("fym_state", JSON.stringify(s)); } catch {} }

// Télémétrie anonyme (bufferisée tant qu'aucun endpoint) — voir CDC D5b
function track(event) {
  try {
    let id = localStorage.getItem("fym_anon");
    if (!id) { id = "a" + Math.random().toString(36).slice(2,11); localStorage.setItem("fym_anon", id); }
    const buf = JSON.parse(localStorage.getItem("fym_track") || "[]");
    buf.push({ e: event, t: Date.now(), id });
    localStorage.setItem("fym_track", JSON.stringify(buf.slice(-200)));
    // TODO V1: POST vers /api/track quand l'endpoint est déployé
  } catch {}
}

/* ============ COMPOSANTS ============ */
function ProgressCircle({ notches, total }) {
  const R = 31, C = 2 * Math.PI * R;
  const frac = Math.min(notches / total, 1);
  return (
    <svg className="circle-svg" viewBox="0 0 74 74">
      <circle className="circle-track" cx="37" cy="37" r={R} />
      <circle className="circle-prog" cx="37" cy="37" r={R}
        strokeDasharray={C} strokeDashoffset={C * (1 - frac)}
        transform="rotate(-90 37 37)" />
      <circle className="circle-dot" cx="37" cy="6" r="4.5" />
    </svg>
  );
}

function Portrait({ pid, size=54 }) {
  const p = PENSEURS[pid];
  const mots = p.nom.split(" ");
  // Un seul mot : deux lettres, sinon Nagarjuna, Nietzsche et Nisargadatta donneraient tous "N".
  const initials = (mots.length === 1 ? p.nom.slice(0,2) : mots.map(w => w[0]).join("").slice(0,2))
    .replace(/^./, c => c.toUpperCase());
  return (
    <div style={{width:size, height:size, borderRadius:"50%", background:`linear-gradient(145deg, ${p.couleur}, ${p.couleur}bb)`,
      display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, fontFamily:"'Baloo 2'", fontSize:size*0.34, boxShadow:"0 4px 12px rgba(74,69,135,0.18)"}}>
      {initials}
    </div>
  );
}

  function toggleTheme() {
    const s = {...state, prefs: {...state.prefs, theme: state.prefs.theme === "dark" ? "light" : "dark"}};
    setState(s); saveState(s);
  }
  return (
    <div className="app-head">
      <div className="brand">
        <svg width="34" height="34" viewBox="0 0 34 34">
          <path d="M 17,4 A 13,13 0 1 1 7.8,26.2" fill="none" stroke="var(--indigo)" strokeWidth="3.4" strokeLinecap="round"/>
          <circle cx="26.2" cy="7.8" r="2.6" fill="var(--coral)"/>
        </svg>
        <div>
          <div className="brand-name">FYM</div>
          <div className="brand-sig">la plus belle aventure du monde</div>
        </div>
      </div>
      <button className="theme-btn" onClick={toggleTheme}>{state.prefs.theme === "dark" ? "☀" : "☾"}</button>
    </div>
  );
}

function Nav({ tab, setTab }) {
  const items = [
    { id: "parcours", ico: "◔", label: "Parcours" },
    { id: "present", ico: "✦", label: "Présent" },
    { id: "constellation", ico: "✵", label: "Ciel" },
    { id: "carnet", ico: "❒", label: "Carnet" },
    { id: "claire", ico: "◍", label: "Claire" },
  ];
  return (
    <div className="nav">
      {items.map(it => (
        <button key={it.id} className={"nav-item" + (tab === it.id ? " active" : "")} onClick={() => setTab(it.id)}>
          <span className="nav-ico">{it.ico}</span>{it.label}
        </button>
      ))}
    </div>
  );
}

function ParcoursScreen({ state, setState, go }) {
  const mv = state.progression.mouvement;
  const movement = MOVEMENTS[mv-1];
  const frags = FRAGMENTS[mv] || [];
  const done = state.progression.done;
  return (
    <div className="screen">
      <Header state={state} setState={setState} />
      {/* frise des 5 mouvements — les à venir sont grisés */}
      <div className="mv-strip">
        {MOVEMENTS.map((m, i) => {
          const num = i + 1;
          const state_ = num < mv ? "past" : num === mv ? "current" : "future";
          return (
            <div key={m.id} className={"mv-pill mv-" + state_}>
              <div className="mv-pill-num">{num}</div>
              <div className="mv-pill-label">{m.title}</div>
            </div>
          );
        })}
      </div>
      <div className="circle-wrap">
        <ProgressCircle notches={state.circleNotches} total={15} />
      </div>
      <h1 className="title">{movement.title}</h1>
      <div className="subtitle">Mouvement {mv} · {movement.sub}</div>
      {frags.map((f, i) => {
        const sid = `${mv}-${i}`;
        const isDone = done.includes(sid);
        const isCurrent = !isDone && (i === 0 || done.includes(`${mv}-${i-1}`));
        const locked = !isDone && !isCurrent;
        return (
          <div key={i} className={"path-node" + (locked ? " locked" : " tappable")}
            onClick={() => { if (!locked) go("section", { sid, idx: i }); }}>
            <div className={"node-circle " + (isDone ? "done" : isCurrent ? "current" : "locked")}>
              {isDone ? "✓" : i+1}
            </div>
            <div>
              <div className="node-title">Section {i+1}</div>
              <div className="node-sub">{locked ? "Verrouillé" : isDone ? "Revisiter" : "Votre rendez-vous"}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Relecture automatique du Carnet — B10 : fin de mouvement, J30, J90.
// "Voici ce que vous aviez écrit" sans aucun commentaire de l'app.
function RelectureScreen({ state, setState, go, params }) {
  const { scope, mv } = params;
  const entries = scope === "mouvement"
    ? state.carnet.filter(e => e.mv === mv)
    : state.carnet; // J30 / J90 : l'ensemble du carnet écrit jusqu'ici

  // Le questionnaire n'est reproposé qu'à trois moments (B12) : fin du mouvement 1, J30, J90.
  const trigger = scope === "mouvement" ? (mv === 1 ? "mouvement1" : null) : scope;
  const passations = state.questionnaire?.passations || [];
  const dejaPasse = trigger && passations.some(p => p.trigger === trigger);
  const reproposer = !!trigger && !dejaPasse && passations.length > 0;

  const [phase, setPhase] = useState("carnet");
  const [qIdx, setQIdx] = useState(0);
  const [reponses, setReponses] = useState([]);

  const titles = {
    mouvement: "Ce que vous avez écrit sur ce mouvement",
    j30: "Trente jours ont passé",
    j90: "Quatre-vingt-dix jours ont passé",
  };
  const subtitles = {
    mouvement: "Sans commentaire. Juste ce qui a été posé.",
    j30: "Voici ce que vous aviez écrit.",
    j90: "Voici ce que vous aviez écrit.",
  };

  function questionFor(e) {
    const idx = Number(String(e.sid).split("-")[1]);
    return (CARNET_Q[e.mv] || [])[idx] || null;
  }

  function marquerRelecture(s) {
    s.relectures = {...s.relectures};
    if (scope === "mouvement") {
      if (!s.relectures.mouvements.includes(mv)) s.relectures.mouvements = [...s.relectures.mouvements, mv];
    } else if (scope === "j30") { s.relectures.j30 = true; }
    else if (scope === "j90") { s.relectures.j90 = true; }
    return s;
  }

  // Fin de la relecture du carnet : soit on repropose le questionnaire, soit on sort.
  function apresCarnet() {
    if (reproposer) { setPhase("seuil"); return; }
    const s = marquerRelecture({...state});
    setState(s); saveState(s);
    track("relecture_vue");
    go("parcours");
  }

  function repondre(choix) {
    const next = [...reponses, choix];
    setReponses(next);
    if (qIdx + 1 < QUESTIONNAIRE.length) { setQIdx(qIdx + 1); }
    else { enregistrer(next); }
  }

  function enregistrer(rep) {
    const s = marquerRelecture({...state});
    const analytiques = rep.filter(r => r === "a").length;
    s.questionnaire = {
      passations: [...passations, { date: todayStr(), trigger, reponses: rep }],
      calibrage: analytiques > rep.length / 2 ? "analytique" : "intuitif",
    };
    setState(s); saveState(s);
    track("questionnaire_repasse");
    setPhase("comparaison");
  }

  function sortir() { track("relecture_vue"); go("parcours"); }

  /* --- Phase : relecture du carnet --- */
  if (phase === "carnet") {
    return (
      <div className="screen">
        <div className="app-head">
          <div style={{width:38}} />
          <div className="brand-sig">Relecture</div>
          <div style={{width:38}} />
        </div>
        <div className="eyebrow" style={{textAlign:"center"}}>{titles[scope]}</div>
        <div className="subtitle" style={{textAlign:"center", marginBottom:18}}>{subtitles[scope]}</div>
        {entries.length === 0 && (
          <div className="card" style={{textAlign:"center", color:"var(--text-soft)"}}>Rien n'a encore été écrit ici.</div>
        )}
        {entries.map((e, i) => {
          const q = questionFor(e);
          return (
            <div key={i} className="card" style={{marginBottom:12}}>
              {q && <div style={{fontSize:12, color:"var(--text-soft)", marginBottom:6}}>{q}</div>}
              <div style={{fontSize:15, fontWeight:600}}>{e.body}</div>
              <div style={{fontSize:11, color:"var(--text-soft)", marginTop:8}}>{e.date}</div>
            </div>
          );
        })}
        <button className="btn btn-primary" onClick={apresCarnet}>Poursuivre</button>
      </div>
    );
  }

  /* --- Phase : seuil avant de repasser les douze questions --- */
  if (phase === "seuil") {
    return (
      <div className="screen">
        <div className="onb-center">
          <div className="eyebrow">Les mêmes douze questions</div>
          <div className="card" style={{textAlign:"left", marginBottom:22}}>
            <div style={{fontSize:15.5, lineHeight:1.7}}>
              Vous les avez déjà rencontrées. Ne cherchez pas ce que vous aviez répondu.
              <br/><br/>
              Répondez comme si c'était la première fois.
            </div>
          </div>
          <button className="btn btn-primary" onClick={() => setPhase("questionnaire")}>Poursuivre</button>
        </div>
      </div>
    );
  }

  /* --- Phase : les douze questions --- */
  if (phase === "questionnaire") {
    const q = QUESTIONNAIRE[qIdx];
    return (
      <div className="screen">
        <div className="app-head">
          <div style={{width:38}} />
          <div className="brand-sig">{qIdx + 1} sur {QUESTIONNAIRE.length}</div>
          <div style={{width:38}} />
        </div>
        <div className="q-bar"><div className="q-bar-fill" style={{width: `${(qIdx / QUESTIONNAIRE.length) * 100}%`}} /></div>
        <div className="eyebrow" style={{marginTop:18}}>{q.section}</div>
        <div className="card card-glossy" style={{marginBottom:16}}>
          <div style={{fontSize:16.5, lineHeight:1.6, fontWeight:600}}>{q.q}</div>
        </div>
        <button className="btn btn-ghost q-choice" onClick={() => repondre("a")}>{q.a}</button>
        <button className="btn btn-ghost q-choice" onClick={() => repondre("b")}>{q.b}</button>
      </div>
    );
  }

  /* --- Phase : les réponses côte à côte. Aucun commentaire, aucune interprétation. --- */
  const premiere = passations[0];
  const nb = QUESTIONNAIRE.filter((_, i) => premiere.reponses[i] !== reponses[i]).length;
  return (
    <div className="screen">
      <div className="app-head">
        <div style={{width:38}} />
        <div className="brand-sig">Côte à côte</div>
        <div style={{width:38}} />
      </div>
      <div className="eyebrow" style={{textAlign:"center"}}>Alors, et maintenant</div>
      <div className="subtitle" style={{textAlign:"center", marginBottom:18}}>
        {nb === 0 ? "Rien n'a bougé. C'est un résultat comme un autre."
          : nb === 1 ? "Une réponse a changé."
          : `${nb} réponses ont changé.`}
      </div>
      {QUESTIONNAIRE.map((q, i) => {
        const avant = premiere.reponses[i];
        const apres = reponses[i];
        const change = avant !== apres;
        return (
          <div key={i} className="card" style={{marginBottom:10, borderColor: change ? "var(--coral)" : "var(--line)"}}>
            <div style={{fontSize:12.5, color:"var(--text-soft)", marginBottom:8}}>{q.q}</div>
            <div className="cmp-row">
              <div className="cmp-col">
                <div className="cmp-lab">{premiere.date}</div>
                <div style={{fontSize:13, lineHeight:1.45}}>{avant === "a" ? q.a : q.b}</div>
              </div>
              <div className="cmp-col" style={{borderLeft:"1px solid var(--line)", paddingLeft:10}}>
                <div className="cmp-lab" style={{color: change ? "var(--coral-deep)" : "var(--text-soft)"}}>aujourd'hui</div>
                <div style={{fontSize:13, lineHeight:1.45, fontWeight: change ? 600 : 400}}>{apres === "a" ? q.a : q.b}</div>
              </div>
            </div>
          </div>
        );
      })}
      <button className="btn btn-primary" onClick={sortir}>Poursuivre</button>
    </div>
  );
}

function SectionScreen({ state, setState, go, params }) {
  const mv = state.progression.mouvement;
  const idx = params.idx;
  const frag = (FRAGMENTS[mv] || [])[idx];
  const question = (CARNET_Q[mv] || [])[idx];
  // 6 quiz par mouvement pour 15 sections : un quiz une section sur deux (0, 2, 4, 8, 10…).
  const quiz = idx % 2 === 0 ? (QUIZ[mv] || [])[idx / 2] : undefined;
  const hasQuiz = !!quiz;
  const [lexOpen, setLexOpen] = useState(null);
  const [note, setNote] = useState("");
  const [step, setStep] = useState(0);
  const [closingTarget, setClosingTarget] = useState(null);
  const sid = params.sid;

  function renderFragment(text, lexKey) {
    if (!lexKey || !LEXIQUE[lexKey]) return text;
    const parts = text.split(new RegExp(`(${lexKey})`, "i"));
    return parts.map((p, i) =>
      p.toLowerCase() === lexKey.toLowerCase()
        ? <span key={i} className="lex" onClick={() => setLexOpen(lexKey)}>{p}</span>
        : <span key={i}>{p}</span>
    );
  }

  function complete() {
    const s = {...state};
    if (!s.progression.done.includes(sid)) {
      s.progression.done = [...s.progression.done, sid];
      s.circleNotches = Math.min(s.circleNotches + 1, 15);
    }
    if (note.trim()) {
      s.carnet = [{ date: todayStr(), sid, mv, body: note.trim() }, ...s.carnet];
    }
    // fin de mouvement : toutes les sections du mouvement sont faites et la relecture n'a pas encore été vue
    const totalSections = (FRAGMENTS[mv] || []).length;
    const doneInMv = s.progression.done.filter(d => d.startsWith(mv + "-")).length;
    const mvJustFinished = totalSections > 0 && doneInMv >= totalSections && !s.relectures.mouvements.includes(mv);
    setState(s); saveState(s);
    track("section_complete");
    if (navigator.vibrate) navigator.vibrate(30);
    // geste de clôture (B13) : le cercle se referme d'un cran avant de quitter la section
    setClosingTarget(mvJustFinished ? { name: "relecture", params: { scope: "mouvement", mv } } : { name: "parcours", params: {} });
    setStep(3);
  }

  function afterFragment() { setStep(hasQuiz ? 1 : 2); }

  useEffect(() => {
    if (step !== 3 || !closingTarget) return;
    const t = setTimeout(() => go(closingTarget.name, closingTarget.params), 2600);
    return () => clearTimeout(t);
  }, [step, closingTarget]);

  return (
    <div className="screen">
      <div className="app-head">
        <button className="theme-btn" onClick={() => go("parcours")}>←</button>
        <div className="brand-sig">Section {idx+1}</div>
        <div style={{width:38}} />
      </div>

      {step === 0 && (
        <div>
          <div className="eyebrow">Le fragment du jour</div>
          <div className="card card-glossy">
            <div className="fragment-text">{renderFragment(frag.t, frag.lex)}</div>
          </div>
          {frag.lex && <div className="subtitle" style={{textAlign:'center',fontSize:12}}>Touchez le mot souligné pour le défaire</div>}
          <button className="btn btn-primary" onClick={afterFragment}>Continuer</button>
        </div>
      )}

      {step === 1 && hasQuiz && (
        <QuizConvergence quiz={quiz} onDone={() => {
          const s = {...state};
          s.constellation = s.constellation || { etoiles: [], fils: [] };
          quiz.correct.forEach(pid => { if (!s.constellation.etoiles.includes(pid)) s.constellation.etoiles.push(pid); });
          for (let i=0;i<quiz.correct.length;i++) for (let j=i+1;j<quiz.correct.length;j++) {
            const de = quiz.correct[i], vers = quiz.correct[j];
            const exists = s.constellation.fils.some(f => (f.de===de&&f.vers===vers)||(f.de===vers&&f.vers===de));
            if (!exists) s.constellation.fils.push({ de, vers, date: todayStr() });
          }
          setState(s); saveState(s);
          track("quiz_done");
          setStep(1.5);
        }} />
      )}

      {step === 1.5 && (
        <div>
          <div className="eyebrow" style={{textAlign:'center'}}>Votre ciel s'agrandit</div>
          <ConstellationSky cons={state.constellation || { etoiles: [], fils: [] }} />
          <div style={{textAlign:"center", fontSize:12.5, color:"var(--sage-deep)", fontWeight:600, margin:"14px 0"}}>
            ✦ Ces éclaireurs ont rejoint votre ciel
          </div>
          <button className="btn btn-primary" onClick={() => setStep(2)}>Poursuivre</button>
        </div>
      )}

      {step === 2 && (
        <div>
          <div className="eyebrow">Une ligne au carnet</div>
          <div className="card">
            <div style={{fontSize:15,fontWeight:600,marginBottom:12}}>{question}</div>
            <textarea className="carnet-input" rows="3" placeholder="Une ligne suffit… Bref et précis."
              value={note} onChange={e => setNote(e.target.value)} />
          </div>
          <button className="btn btn-sage" onClick={complete}>Poursuivre</button>
        </div>
      )}

      {step === 3 && (
        <div className="closing-screen">
          <div className="closing-circle">
            <svg width="52" height="52" viewBox="0 0 34 34">
              <path d="M 17,4 A 13,13 0 1 1 7.8,26.2" fill="none" stroke="var(--indigo)" strokeWidth="3.4" strokeLinecap="round"/>
              <circle cx="26.2" cy="7.8" r="2.6" fill="var(--coral)"/>
            </svg>
          </div>
          <div className="closing-title">Merci.</div>
          <div className="closing-sub">À demain.</div>
          <button className="btn btn-ghost" onClick={() => go(closingTarget.name, closingTarget.params)}>Fermer</button>
        </div>
      )}

      {lexOpen && (
        <div className="modal-bg" onClick={() => setLexOpen(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="eyebrow" style={{textAlign:'center'}}>Le mot défait</div>
            <div className="word-parts">
              {LEXIQUE[lexOpen].parts.map((p,i) => <span key={i} className="word-part" style={{animationDelay:`${i*0.12}s`}}>{p}</span>)}
            </div>
            <div className="lex-root">{LEXIQUE[lexOpen].root}</div>
            <div className="lex-block"><b>Sens premier.</b> {LEXIQUE[lexOpen].sens}</div>
            <div className="lex-block"><b>L'écart.</b> {LEXIQUE[lexOpen].ecart}</div>
            <div className="lex-block" style={{fontStyle:'italic',color:'var(--coral-deep)'}}>{LEXIQUE[lexOpen].q}</div>
            <button className="btn btn-ghost" onClick={() => setLexOpen(null)}>Refermer</button>
          </div>
        </div>
      )}
    </div>
  );
}

function PresentScreen({ state, setState }) {
  const day = todayStr();
  const rec = state.presents[day];
  const [opened, setOpened] = useState(rec?.ouvert || false);
  const [dragY, setDragY] = useState(0);
  const startY = useRef(null);
  const startT = useRef(null);
  const holdTimer = useRef(null);
  const [progress, setProgress] = useState(0); // 0 → 1, progression d'ouverture
  const text = rec?.contenu || PRESENTS[daysSince(state.installDate) % PRESENTS.length];

  function doOpen() {
    const s = {...state};
    s.presents[day] = { ouvert: true, contenu: text };
    setState(s); saveState(s);
    setOpened(true); track("present_open");
    if (navigator.vibrate) navigator.vibrate([20,30,40]);
  }

  function onDown(e) {
    startY.current = (e.touches?.[0]?.clientY ?? e.clientY);
    startT.current = Date.now();
  }
  function onMove(e) {
    if (startY.current == null) return;
    const y = (e.touches?.[0]?.clientY ?? e.clientY);
    const d = Math.max(0, startY.current - y);
    setDragY(d);
    // progression combinée : distance ET temps de maintien (résistance douce)
    const elapsed = (Date.now() - (startT.current || 0)) / 1000; // secondes
    const pDist = Math.min(d / 140, 1);
    const pTime = Math.min(elapsed / 2.2, 1); // ne peut pas s'ouvrir en moins de ~2,2s
    const p = Math.min(pDist, pTime);
    setProgress(p);
    if (p >= 0.99 && !opened) doOpen();
  }
  function onUp() {
    setDragY(0);
    setProgress(0);
    startY.current = null;
  }
  const lift = Math.min(dragY, 200);

  return (
    <div className="screen" style={{display:"flex", flexDirection:"column", minHeight:"100vh"}}>
      <Header state={state} setState={setState} />
      <div className="eyebrow" style={{textAlign:'center'}}>Le Présent d'aujourd'hui</div>
      {!opened ? (
        <div style={{flex:1, display:"flex", flexDirection:"column", justifyContent:"flex-end", paddingBottom:20}}>
          <div style={{textAlign:"center", marginBottom:24}}>
            <div style={{fontWeight:700, fontSize:19, marginBottom:6}}>Une correspondance vous attend</div>
            <div className="env-hint">
              {progress > 0
                ? (progress < 0.99 ? "Continuez à tirer doucement, sans relâcher…" : "Elle s'ouvre…")
                : "Posez le doigt sur le sceau et tirez lentement vers le haut, sans relâcher."}
              <br/>Elle disparaît à minuit si elle n'est pas ouverte.
            </div>
            {/* barre de progression d'ouverture */}
            <div style={{height:5, background:"var(--line)", borderRadius:100, margin:"14px auto 0", maxWidth:200, overflow:"hidden"}}>
              <div style={{height:"100%", width:`${progress*100}%`, background:"var(--coral)", borderRadius:100, transition: startY.current==null ? "width 0.4s ease" : "none"}} />
            </div>
          </div>
          <div className="envelope"
            style={{ transform: `translateY(${-lift}px) scale(${1 + progress*0.04})`, transition: startY.current==null ? "transform 0.6s cubic-bezier(.34,1.56,.64,1)" : "none" }}
            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}>
            <div className="env-flap" style={{transform:`translateY(${-progress*40}%)`, opacity: 0.55 - progress*0.4, transition: startY.current==null ? "all 0.6s ease" : "none"}} />
            <div className="env-seal-circle" style={{boxShadow:`0 0 0 ${progress*8}px rgba(242,168,142,${progress*0.4})`}}>
              <svg width="46" height="46" viewBox="0 0 46 46">
                <path d="M 23,5 A 18,18 0 1 1 10.5,36" fill="none" stroke="var(--coral)" strokeWidth="3" strokeLinecap="round"/>
                <circle cx="36" cy="10.5" r="3.4" fill="var(--coral)"/>
              </svg>
            </div>
          </div>
        </div>
      ) : (
        <div className="card card-glossy present-card" style={{marginTop:20}}>
          <div className="present-open-text">{text}</div>
        </div>
      )}
    </div>
  );
}

function CarnetScreen({ state, setState }) {
  const passations = state.questionnaire?.passations || [];
  const [ouvert, setOuvert] = useState(false);
  const premiere = passations[0];
  const derniere = passations[passations.length - 1];
  // Les réponses ne s'affichent côte à côte qu'à partir d'une deuxième passation (B12).
  const comparable = passations.length > 1;

  return (
    <div className="screen">
      <Header state={state} setState={setState} />
      <h1 className="title">Le Carnet</h1>
      <div className="subtitle">Vos traces, dans l'ordre où elles sont venues.</div>

      {comparable && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:10}}
            onClick={() => setOuvert(!ouvert)}>
            <div>
              <div style={{fontSize:14.5, fontWeight:600}}>Les douze questions, côte à côte</div>
              <div style={{fontSize:12, color:"var(--text-soft)", marginTop:2}}>
                {premiere.date} · {derniere.date}
              </div>
            </div>
            <div style={{fontSize:16, color:"var(--text-soft)"}}>{ouvert ? "−" : "+"}</div>
          </div>
          {ouvert && (
